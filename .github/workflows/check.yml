name: mail-check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mail-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: run checker
        env:
          BIGLOBE_PASSWORD: ${{ secrets.BIGLOBE_PASSWORD }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python checker.py

      - name: save state
        run: |
          git config user.name "mail-check-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || (git commit -m "state update" && git push)
